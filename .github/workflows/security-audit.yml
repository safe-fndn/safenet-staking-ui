name: Security Audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1" # weekly, Mondays at 04:00 UTC
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Dependency Review
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261 # v4.8.2
        with:
          fail-on-severity: high

  unit-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "22.13.1"
          cache: npm
      - name: Install dependencies (no lifecycle scripts)
        run: npm ci --ignore-scripts
      - name: Run unit and integration tests
        run: npm test

  npm-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "22.13.1"
          cache: npm
      - name: Install dependencies (no lifecycle scripts)
        run: npm ci --ignore-scripts
      - name: npm audit (high severity and above)
        run: npm audit --audit-level=high

  secret-scanning:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: read
    steps:
      - name: Check Secret Scanning alerts (GitHub Advanced Security)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          token = os.environ.get("GH_TOKEN")
          repo = os.environ.get("REPO")

          if not token or not repo:
            print("Missing token or repository info; skipping secret scanning check.")
            sys.exit(0)

          url = f"https://api.github.com/repos/{repo}/secret-scanning/alerts?state=open&per_page=100"
          req = urllib.request.Request(
            url,
            headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "security-audit",
            },
          )

          try:
            with urllib.request.urlopen(req) as resp:
              data = json.load(resp)
          except urllib.error.HTTPError as e:
            if e.code in (403, 404):
              print(f"Secret scanning not enabled or not accessible (HTTP {e.code}). Skipping.")
              sys.exit(0)
            raise

          if isinstance(data, list) and data:
            print(f"Open secret scanning alerts: {len(data)}")
            for alert in data[:10]:
              number = alert.get("number", "n/a")
              name = alert.get("secret_type_display_name", "unknown")
              print(f"- #{number}: {name}")
            sys.exit(1)

          print("No open secret scanning alerts.")
          PY
