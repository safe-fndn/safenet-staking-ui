name: Deploy to IPFS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ipfs
  cancel-in-progress: true

# Principle of least privilege: no permissions needed for IPFS deploy
permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      # Pin actions to full SHA — mutable tags (v4) can be hijacked
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "22.13.1"
          cache: npm

      # --ignore-scripts blocks postinstall hooks from compromised packages
      - name: Install dependencies (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Audit dependencies (high severity and above)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Compute build checksum
        run: |
          find dist -type f -exec sha256sum {} + | LC_ALL=C sort | tee /tmp/build-checksums.txt
          HASH=$(sha256sum /tmp/build-checksums.txt | awk '{print $1}')
          echo "### Build Manifest" >> "$GITHUB_STEP_SUMMARY"
          echo "**Checksum:** \`${HASH}\`" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist
          retention-days: 14
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-manifest
          path: /tmp/build-checksums.txt
          retention-days: 14

  deploy:
    needs: build
    permissions:
      contents: read
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    # Require manual approval via GitHub Environment protection rules
    # Set up at: Settings > Environments > production > Required reviewers
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: scripts
          persist-credentials: false

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "22.13.1"

      # Only install the deploy script's dependency, not the full tree
      # --ignore-scripts blocks postinstall hooks (Pinata SDK is pure JS, no scripts needed)
      - name: Install Pinata SDK
        run: npm install --no-save --ignore-scripts pinata@2.5.4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-manifest
          path: .

      - name: Verify artifact checksums
        run: sha256sum -c build-checksums.txt

      # Artifact integrity is verified by download-artifact v4's built-in
      # SHA256 digest check (visible in the download step logs above).

      - name: Upload to IPFS via Pinata
        id: pinata
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_GATEWAY: ${{ vars.PINATA_GATEWAY }}
        run: node scripts/deploy-ipfs.mjs --skip-build 2>&1 | tee /tmp/pinata-output.txt

      - name: Print deployment URL
        env:
          PINATA_GATEWAY: ${{ vars.PINATA_GATEWAY }}
        run: |
          CID=$(grep '^CID:' /tmp/pinata-output.txt | awk '{print $2}')
          echo "CID:  ${CID}"
          echo "URL:  https://${PINATA_GATEWAY}/ipfs/${CID}"
          echo "### IPFS Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CID:** \`${CID}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Gateway:** https://${PINATA_GATEWAY}/ipfs/${CID}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **dweb.link:** https://${CID}.ipfs.dweb.link/" >> "$GITHUB_STEP_SUMMARY"
