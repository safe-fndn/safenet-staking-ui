name: Deploy to IPFS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ipfs
  cancel-in-progress: true

# Principle of least privilege: no permissions needed for IPFS deploy
permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    environment: production
    steps:
      # Pin actions to full SHA — mutable tags (v4) can be hijacked
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: ".nvmrc"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Audit dependencies (high severity and above)
        run: yarn audit --level high || true

      - name: Build
        env:
          VITE_CHAIN_ID: ${{ vars.VITE_CHAIN_ID }}
          VITE_RPC_URL: ${{ vars.VITE_RPC_URL }}
          VITE_STAKING_DEPLOY_BLOCK: ${{ vars.VITE_STAKING_DEPLOY_BLOCK }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_SANCTIONS_API_URL: ${{ vars.VITE_SANCTIONS_API_URL }}
          VITE_GEOBLOCK_CACHE_DAYS: ${{ vars.VITE_GEOBLOCK_CACHE_DAYS }}
          VITE_VALIDATOR_INFO_URL: ${{ vars.VITE_VALIDATOR_INFO_URL }}
          VITE_REWARDS_BASE_URL: ${{ vars.VITE_REWARDS_BASE_URL }}
          VITE_DOCS_URL: ${{ vars.VITE_DOCS_URL }}
          VITE_TERMS_URL: ${{ vars.VITE_TERMS_URL }}
          VITE_PRIVACY_URL: ${{ vars.VITE_PRIVACY_URL }}
          VITE_IMPRINT_URL: ${{ vars.VITE_IMPRINT_URL }}
          VITE_MERKLE_DROP_ADDRESS: ${{ vars.VITE_MERKLE_DROP_ADDRESS }}
        run: yarn build

      - name: Compute build checksum
        run: |
          find dist -type f ! -name '.gitkeep' -exec sha256sum {} + | LC_ALL=C sort | tee /tmp/build-checksums.txt
          HASH=$(sha256sum /tmp/build-checksums.txt | awk '{print $1}')
          echo "### Build Manifest" >> "$GITHUB_STEP_SUMMARY"
          echo "**Checksum:** \`${HASH}\`" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist
          retention-days: 14
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-manifest
          path: /tmp/build-checksums.txt
          retention-days: 14

  deploy:
    needs: build
    permissions:
      contents: read
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    # Require manual approval via GitHub Environment protection rules
    # Set up at: Settings > Environments > production > Required reviewers
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: scripts
          persist-credentials: false

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: ".nvmrc"

      # Only install the deploy script's dependency, not the full tree
      - name: Install Pinata SDK
        run: yarn add --no-lockfile pinata@2.5.4

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: build-manifest
          path: .

      - name: Verify artifact checksums
        run: sha256sum -c build-checksums.txt

      # Artifact integrity is verified by download-artifact v4's built-in
      # SHA256 digest check (visible in the download step logs above).

      - name: Upload to IPFS via Pinata
        id: pinata
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_GATEWAY: ${{ vars.PINATA_GATEWAY }}
        run: node scripts/deploy-ipfs.mjs --skip-build 2>&1 | tee /tmp/pinata-output.txt

      - name: Print deployment URL
        env:
          PINATA_GATEWAY: ${{ vars.PINATA_GATEWAY }}
        run: |
          CID=$(grep '^CID:' /tmp/pinata-output.txt | awk '{print $2}')
          echo "CID:  ${CID}"
          echo "URL:  https://${PINATA_GATEWAY}/ipfs/${CID}"
          echo "### IPFS Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CID:** \`${CID}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Gateway:** https://${PINATA_GATEWAY}/ipfs/${CID}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **dweb.link:** https://${CID}.ipfs.dweb.link/" >> "$GITHUB_STEP_SUMMARY"
